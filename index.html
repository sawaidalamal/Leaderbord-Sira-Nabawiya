<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏆 Leaderboard</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ─── RESET & BASE ─── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(145deg, #0b0e1a 0%, #1a1f35 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
      color: #e8edf5;
    }

    /* ─── MAIN CONTAINER ─── */
    .app-container {
      max-width: 1100px;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 35px 40px 45px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.3s ease;
    }

    /* ─── HEADER ─── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-left .trophy {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #f5af19, #f12711);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-left h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff, #aab4d6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-left .badge-count {
      font-size: 0.8rem;
      background: rgba(255, 255, 255, 0.08);
      padding: 4px 14px;
      border-radius: 30px;
      color: #aab4d6;
      border: 1px solid rgba(255, 255, 255, 0.06);
      -webkit-text-fill-color: #aab4d6;
    }

    /* ─── STATS BAR ─── */
    .stats-bar {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      padding: 16px 22px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      color: #aab4d6;
    }

    .stat-item i {
      font-size: 1.1rem;
      color: #6c5ce7;
    }

    .stat-item strong {
      color: #ffffff;
      font-weight: 600;
      margin-right: 2px;
    }

    .stat-item .num {
      color: #f5af19;
      font-weight: 700;
      font-size: 1.1rem;
    }

    /* ─── TABLE ─── */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    thead {
      background: rgba(255, 255, 255, 0.04);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    thead th {
      padding: 18px 20px;
      text-align: left;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8892b0;
      white-space: nowrap;
    }

    thead th:first-child {
      border-radius: 20px 0 0 0;
    }
    thead th:last-child {
      border-radius: 0 20px 0 0;
    }

    tbody tr {
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: scale(1.002);
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody td {
      padding: 16px 20px;
      vertical-align: middle;
    }

    /* Rank */
    .rank-cell {
      font-weight: 700;
      font-size: 1.1rem;
      width: 70px;
      text-align: center;
    }

    .rank-medal {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 0.85rem;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.04);
    }

    .rank-medal.gold {
      background: linear-gradient(135deg, #f5af19, #f12711);
      color: #fff;
    }
    .rank-medal.silver {
      background: linear-gradient(135deg, #bdc3c7, #95a5a6);
      color: #fff;
    }
    .rank-medal.bronze {
      background: linear-gradient(135deg, #cd7f32, #a0522d);
      color: #fff;
    }
    .rank-medal.default {
      color: #6c7a9a;
    }

    /* Name */
    .name-cell {
      font-weight: 600;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      color: #fff;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .avatar.green {
      background: linear-gradient(135deg, #00b894, #55efc4);
    }
    .avatar.pink {
      background: linear-gradient(135deg, #e17055, #fd79a8);
    }
    .avatar.blue {
      background: linear-gradient(135deg, #0984e3, #74b9ff);
    }
    .avatar.purple {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    }
    .avatar.orange {
      background: linear-gradient(135deg, #e17055, #fdcb6e);
    }
    .avatar.teal {
      background: linear-gradient(135deg, #00b894, #81ecec);
    }

    /* Score */
    .score-cell {
      font-weight: 700;
      font-size: 1.1rem;
      color: #f5af19;
      text-align: center;
    }

    /* Quiz count */
    .quiz-count-cell {
      text-align: center;
      color: #6c7a9a;
      font-size: 0.85rem;
    }

    /* Expand arrow */
    .expand-cell {
      text-align: center;
      color: #6c7a9a;
      font-size: 0.9rem;
      transition: transform 0.3s ease;
      width: 40px;
    }

    tbody tr.expanded .expand-cell i {
      transform: rotate(180deg);
    }

    /* ─── EXPANDABLE DETAIL ROW ─── */
    .detail-row {
      display: none;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .detail-row.open {
      display: table-row;
    }

    .detail-row td {
      padding: 0 20px 20px 20px;
    }

    .detail-inner {
      padding: 20px 24px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-top: 4px;
    }

    .detail-inner h4 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8892b0;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .detail-inner h4 i {
      color: #6c5ce7;
    }

    .quiz-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .quiz-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      min-width: 160px;
      flex: 1 0 auto;
    }

    .quiz-item .qname {
      font-weight: 500;
      color: #e8edf5;
      font-size: 0.9rem;
    }

    .quiz-item .qscore {
      font-weight: 700;
      font-size: 1.1rem;
      color: #55efc4;
      margin-left: auto;
    }

    .quiz-item .qscore.low {
      color: #e17055;
    }
    .quiz-item .qscore.medium {
      color: #fdcb6e;
    }
    .quiz-item .qscore.high {
      color: #55efc4;
    }

    .no-quizzes {
      color: #6c7a9a;
      font-style: italic;
      font-size: 0.9rem;
    }

    /* ─── LOADING / ERROR ─── */
    .status-message {
      text-align: center;
      padding: 40px 20px;
      color: #aab4d6;
      font-size: 1.1rem;
    }

    .status-message i {
      font-size: 2rem;
      display: block;
      margin-bottom: 16px;
      color: #6c5ce7;
    }

    .status-message.error i {
      color: #e17055;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .app-container {
        padding: 20px 16px 30px;
        border-radius: 24px;
      }

      .header {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }

      .header-left h1 {
        font-size: 1.4rem;
      }
      .header-left .trophy {
        font-size: 1.6rem;
      }

      .stats-bar {
        flex-direction: column;
        gap: 8px;
        padding: 14px 18px;
      }

      thead th,
      tbody td {
        padding: 12px 12px;
        font-size: 0.8rem;
      }

      .rank-cell {
        width: 50px;
        font-size: 0.9rem;
      }

      .name-cell {
        font-size: 0.85rem;
        gap: 8px;
      }

      .avatar {
        width: 30px;
        height: 30px;
        font-size: 0.7rem;
      }

      .score-cell {
        font-size: 0.95rem;
      }

      .expand-cell {
        width: 30px;
        font-size: 0.8rem;
      }

      .detail-inner {
        padding: 14px 16px;
      }

      .quiz-item {
        padding: 10px 14px;
        min-width: 120px;
        flex: 1 1 100%;
      }

      .quiz-count-cell {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .app-container {
        padding: 14px 10px 20px;
        border-radius: 18px;
      }

      thead th,
      tbody td {
        padding: 10px 8px;
        font-size: 0.7rem;
      }

      .rank-cell {
        width: 36px;
        font-size: 0.8rem;
      }

      .name-cell {
        font-size: 0.75rem;
        gap: 6px;
      }

      .avatar {
        width: 24px;
        height: 24px;
        font-size: 0.6rem;
      }

      .score-cell {
        font-size: 0.8rem;
      }

      .expand-cell {
        width: 24px;
        font-size: 0.7rem;
      }

      .detail-inner h4 {
        font-size: 0.7rem;
      }

      .quiz-item .qname {
        font-size: 0.75rem;
      }
      .quiz-item .qscore {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <div class="app-container" id="app">
    <!-- HEADER -->
    <header class="header">
      <div class="header-left">
        <span class="trophy"><i class="fas fa-trophy"></i></span>
        <h1>Leaderboard</h1>
        <span class="badge-count" id="userCountBadge">—</span>
      </div>
    </header>

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-item">
        <i class="fas fa-users"></i>
        <span><strong id="totalUsers">0</strong> participants</span>
      </div>
      <div class="stat-item">
        <i class="fas fa-file-alt"></i>
        <span><strong id="totalQuizzes">0</strong> quizzes taken</span>
      </div>
      <div class="stat-item">
        <i class="fas fa-star"></i>
        <span>Top score: <strong class="num" id="topScore">—</strong></span>
      </div>
    </div>

    <!-- LEADERBOARD TABLE -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th style="text-align:center;">#</th>
            <th>Player</th>
            <th style="text-align:center;">Quizzes</th>
            <th style="text-align:center;">Total Score</th>
            <th style="text-align:center; width:40px;"></th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr>
            <td colspan="5" class="status-message">
              <i class="fas fa-spinner fa-pulse"></i>
              Loading data…
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- FOOTER NOTE -->
    
  </div>

  <script>
    // ================================================================
    //  CONFIG
    // ================================================================

    const DATA_URL = 'data.json'; // relative path to your JSON file

    // ================================================================
    //  DOM REFS
    // ================================================================

    const tbody = document.getElementById('leaderboardBody');
    const totalUsersEl = document.getElementById('totalUsers');
    const totalQuizzesEl = document.getElementById('totalQuizzes');
    const topScoreEl = document.getElementById('topScore');
    const userCountBadge = document.getElementById('userCountBadge');

    // ================================================================
    //  HELPERS
    // ================================================================

    function getInitials(name) {
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function getAvatarClass(name) {
      const hash = name.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
      const classes = ['', 'green', 'pink', 'blue', 'purple', 'orange', 'teal'];
      return classes[hash % classes.length] || '';
    }

    function getRankClass(index) {
      if (index === 0) return 'gold';
      if (index === 1) return 'silver';
      if (index === 2) return 'bronze';
      return 'default';
    }

    function getRankDisplay(index) {
      if (index === 0) return '🥇';
      if (index === 1) return '🥈';
      if (index === 2) return '🥉';
      return `#${index + 1}`;
    }

    function getScoreLevel(score) {
      if (score >= 80) return 'high';
      if (score >= 60) return 'medium';
      return 'low';
    }

    function calcTotal(scores) {
      return scores.reduce((sum, q) => sum + q.score, 0);
    }

    function getQuizCount(scores) {
      return scores.length;
    }

    // ================================================================
    //  RENDER
    // ================================================================

    function render(users) {
      // Sort by total score descending
      const sorted = [...users].sort((a, b) => calcTotal(b.quizScores) - calcTotal(a.quizScores));

      // Stats
      const totalUsers = users.length;
      const totalQuizzes = users.reduce((sum, u) => sum + u.quizScores.length, 0);
      const topScore = sorted.length ? calcTotal(sorted[0].quizScores) : 0;

      totalUsersEl.textContent = totalUsers;
      totalQuizzesEl.textContent = totalQuizzes;
      topScoreEl.textContent = topScore || '—';
      userCountBadge.textContent = `${totalUsers} user${totalUsers !== 1 ? 's' : ''}`;

      // Build rows
      if (sorted.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" class="status-message">
              <i class="fas fa-inbox"></i>
              No users found.
            </td>
          </tr>
        `;
        return;
      }

      let html = '';
      sorted.forEach((user, index) => {
        const total = calcTotal(user.quizScores);
        const qCount = getQuizCount(user.quizScores);
        const rankClass = getRankClass(index);
        const rankDisplay = getRankDisplay(index);
        const avatarClass = getAvatarClass(user.name);
        const initials = getInitials(user.name);

        html += `
          <tr class="user-row" data-userid="${user.id}" data-expanded="false">
            <td class="rank-cell">
              <span class="rank-medal ${rankClass}">${rankDisplay}</span>
            </td>
            <td class="name-cell">
              <span class="avatar ${avatarClass}">${initials}</span>
              ${user.name}
            </td>
            <td class="quiz-count-cell">${qCount}</td>
            <td class="score-cell">${total}</td>
            <td class="expand-cell">
              <i class="fas fa-chevron-down"></i>
            </td>
          </tr>
          <tr class="detail-row" data-userid="${user.id}">
            <td colspan="5">
              <div class="detail-inner">
                <h4><i class="fas fa-clipboard-list"></i> Quiz Scores — ${user.name}</h4>
                <div class="quiz-list">
        `;

        if (user.quizScores.length === 0) {
          html += `<span class="no-quizzes">No quizzes taken yet.</span>`;
        } else {
          // Show quizzes (preserve order from JSON)
          user.quizScores.forEach(q => {
            const level = getScoreLevel(q.score);
            html += `
              <div class="quiz-item">
                <span class="qname">${escapeHtml(q.quizName)}</span>
                <span class="qscore ${level}">${q.score}</span>
              </div>
            `;
          });
        }

        html += `
                </div>
              </div>
            </td>
          </tr>
        `;
      });

      tbody.innerHTML = html;

      // ── Attach click events to rows ──
      document.querySelectorAll('.user-row').forEach(row => {
        row.addEventListener('click', function(e) {
          // ignore if click is on the expand cell itself (but we handle it anyway)
          const userId = this.dataset.userid;
          const detailRow = document.querySelector(`.detail-row[data-userid="${userId}"]`);
          if (!detailRow) return;

          const isOpen = detailRow.classList.contains('open');
          // Close all other detail rows
          document.querySelectorAll('.detail-row.open').forEach(el => {
            if (el.dataset.userid !== userId) {
              el.classList.remove('open');
              const sibling = document.querySelector(`.user-row[data-userid="${el.dataset.userid}"]`);
              if (sibling) sibling.classList.remove('expanded');
            }
          });
          // Toggle this one
          if (isOpen) {
            detailRow.classList.remove('open');
            this.classList.remove('expanded');
          } else {
            detailRow.classList.add('open');
            this.classList.add('expanded');
          }
        });
      });
    }

    // ================================================================
    //  SAFE HTML ESCAPE (prevent XSS from JSON)
    // ================================================================

    function escapeHtml(str) {
      if (!str) return '';
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return str.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    // ================================================================
    //  LOAD DATA
    // ================================================================

    async function loadData() {
      try {
        const response = await fetch(DATA_URL);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} – ${response.statusText}`);
        }
        const data = await response.json();

        // Validate expected structure: { users: [ { id, name, quizScores: [ { quizName, score } ] } ] }
        if (!data.users || !Array.isArray(data.users)) {
          throw new Error('Invalid data format: missing "users" array');
        }

        // Ensure each user has the required fields
        const validUsers = data.users.filter(u =>
          u.id !== undefined &&
          typeof u.name === 'string' &&
          Array.isArray(u.quizScores)
        );

        if (validUsers.length === 0 && data.users.length > 0) {
          console.warn('Some users were filtered out due to invalid structure.');
        }

        render(validUsers);
      } catch (err) {
        console.error('Failed to load leaderboard data:', err);
        tbody.innerHTML = `
          <tr>
            <td colspan="5" class="status-message error">
              <i class="fas fa-exclamation-triangle"></i>
              Could not load <strong>data.json</strong><br />
              <span style="font-size:0.85rem; color:#8892b0;">${escapeHtml(err.message)}</span>
              <br /><br />
              <span style="font-size:0.8rem; color:#6c7a9a;">
                Make sure the file exists and is valid JSON.
              </span>
            </td>
          </tr>
        `;
      }
    }

    // ================================================================
    //  INIT
    // ================================================================

    loadData();
  </script>

</body>
</html>
